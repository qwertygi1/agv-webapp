<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Журнал АКБ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: var(--tg-theme-bg-color, #ffffff); color: var(--tg-theme-text-color, #000000); padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; background-color: var(--tg-theme-secondary-bg-color, #f0f0f0); color: var(--tg-theme-text-color, #000000); }
        button { width: 100%; padding: 15px; background-color: var(--tg-theme-button-color, #3390ec); color: var(--tg-theme-button-text-color, #ffffff); border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Замена АКБ</h2>
    <div class="form-group"><label>Робот (номер):</label><input type="number" id="robot"></div>
    <div class="form-group"><label>Действие:</label><select id="action"><option value="Замена">Замена</option><option value="Отключ">Отключ</option><option value="Низкий V">Низкий V</option></select></div>
    <div class="form-group"><label>АКБ (номер):</label><input type="number" id="akb"></div>
    <div class="form-group"><label>Заряд (%):</label><input type="number" id="charge"></div>
    <div class="form-group"><label>Комментарий:</label><input type="text" id="comment"></div>
    <button id="send-btn">Отправить</button>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        document.getElementById('send-btn').addEventListener('click', () => {
            let data = {
                robot: document.getElementById('robot').value,
                action: document.getElementById('action').value,
                akb: document.getElementById('akb').value,
                charge: document.getElementById('charge').value,
                comment: document.getElementById('comment').value
            };
            tg.sendData(JSON.stringify(data));
        });
    </script>
</body>
</html>
