<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бланк АКБ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 15px;
            margin: 0;
        }
        h2 { text-align: center; margin-bottom: 20px; font-size: 20px; }
        
        .table-container {
            overflow-x: auto;
            margin-bottom: 20px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            border: 1px solid var(--tg-theme-text-color, #000000);
            text-align: center;
            padding: 12px 5px;
            font-size: 15px;
        }
        
        th { 
            font-weight: bold; 
            background-color: var(--tg-theme-secondary-bg-color, #f5f5f5); 
        }
        
        input[type="number"] {
            width: 100%;
            box-sizing: border-box;
            border: none;
            background: transparent;
            color: var(--tg-theme-text-color, #000000);
            text-align: center;
            font-size: 16px;
            outline: none;
        }
        
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        
        /* Стилизуем чекбокс, чтобы по нему было легко попасть пальцем */
        input[type="checkbox"] { 
            transform: scale(1.6); 
            cursor: pointer; 
        }
        
        button {
            width: 100%;
            padding: 15px;
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .auto-text { color: var(--tg-theme-hint-color, gray); font-size: 13px; }
    </style>
</head>
<body>
    <h2>Бланк учета АКБ</h2>
    
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Дата</th>
                    <th>Время</th>
                    <th>Робот</th>
                    <th>АКБ</th>
                    <th>Установлен</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><span class="auto-text">Авто</span></td>
                    <td><span class="auto-text">Авто</span></td>
                    <td><input type="number" id="robot" placeholder="..."></td>
                    <td><input type="number" id="akb" placeholder="..."></td>
                    <td><input type="checkbox" id="installed" checked></td>
                </tr>
            </tbody>
        </table>
    </div>
    
    <button id="send-btn">Отправить данные</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        document.getElementById('send-btn').addEventListener('click', () => {
            let robot = document.getElementById('robot').value;
            let akb = document.getElementById('akb').value;
            let installed = document.getElementById('installed').checked;

            if(!robot || !akb) {
                tg.showAlert("Заполни номер робота и номер АКБ!");
                return;
            }

            let data = {
                robot: robot,
                akb: akb,
                // Если галочка стоит, отправляем эмодзи галочки, если нет — крестик
                installed: installed ? "✅" : "❌"
            };

            tg.sendData(JSON.stringify(data));
        });
    </script>
</body>
</html>
